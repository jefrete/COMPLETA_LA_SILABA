<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Sílabas - Accesible Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .high-contrast { filter: contrast(1.5) brightness(1.1); }
        .high-contrast body { background: #000 !important; }
        .large-text { font-size: 1.25rem; }
        .progress-transition { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        *:focus-visible { outline: 4px solid #3b82f6 !important; outline-offset: 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 transition-colors duration-300">

    <div class="flex flex-col lg:flex-row min-h-screen p-4 gap-6 max-w-7xl mx-auto">
        
        <aside class="w-full lg:w-72 space-y-4 order-2 lg:order-1" role="region" aria-label="Controles de accesibilidad">
            <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl border-b-4 border-blue-600">
                <h3 class="text-xl font-black mb-4 flex items-center gap-2">
                    <span class="text-2xl">♿</span> ACCESIBILIDAD
                </h3>
                
                <div class="grid grid-cols-1 gap-3">
                    <button id="voiceToggle" class="flex items-center justify-between p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all border border-slate-700 active:scale-95">
                        <span class="font-bold">🔊 Voz</span>
                        <span id="voiceStatus" class="bg-red-500 px-2 py-1 rounded text-xs uppercase">OFF</span>
                    </button>

                    <button id="highContrast" class="flex items-center justify-between p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all border border-slate-700 active:scale-95">
                        <span class="font-bold">👁️ Contraste</span>
                        <span id="contrastStatus" class="bg-slate-600 px-2 py-1 rounded text-xs uppercase">Normal</span>
                    </button>

                    <button id="largeText" class="flex items-center justify-between p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all border border-slate-700 active:scale-95">
                        <span class="font-bold">📖 Tamaño</span>
                        <span id="textSizeStatus" class="bg-slate-600 px-2 py-1 rounded text-xs uppercase">Normal</span>
                    </button>

                    <hr class="border-slate-700 my-2">

                    <button id="readAll" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-all">
                        📢 Leer Pantalla
                    </button>

                    <button id="skipLevel" class="w-full py-3 rounded-xl bg-orange-500 hover:bg-orange-400 font-bold active:scale-95 transition-all">
                        ⏭️ Saltar Nivel
                    </button>
                </div>
            </div>

            <div id="tipBox" class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 text-blue-800 shadow-sm">
                <p class="text-sm">
                    <span class="font-bold">💡 Tip:</span> 
                    Una <span class="underline decoration-blue-300">sílaba</span> es cada golpe de voz con el que decimos una palabra.
                </p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col gap-6 order-1 lg:order-2">
            <header class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                    <div class="flex gap-4">
                        <div class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-2xl flex items-center gap-2 font-bold">
                            <span>🏆</span> <span id="score">0</span>
                        </div>
                        <div class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-2xl flex items-center gap-2 font-bold">
                            <span>🔥</span> <span id="streak">0</span>
                        </div>
                    </div>
                    <div id="hearts" class="flex gap-2"></div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between text-sm font-bold text-slate-500 px-1">
                        <span>Progreso del juego</span>
                        <span>Nivel <span id="currentLevel">1</span>/<span id="totalLevels">5</span></span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden shadow-inner">
                        <div id="progressFill" class="h-full bg-gradient-to-r from-blue-500 to-indigo-600 progress-transition" style="width: 0%"></div>
                    </div>
                </div>
            </header>

            <div class="bg-white flex-1 rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col items-center justify-center p-8 relative">
                
                <section id="gameScreen" class="w-full max-w-2xl text-center space-y-8">
                    <div id="characterEmoji" class="text-8xl animate-bounce mb-4">🏠</div>
                    <div class="space-y-2">
                        <h2 id="characterName" class="text-6xl font-black tracking-widest text-slate-800 uppercase">CA__</h2>
                        <p id="characterHint" class="text-xl text-slate-500 font-medium italic">Lugar donde vivimos.</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl inline-block border border-slate-100">
                        <p class="text-slate-600 font-bold">¿Qué sílaba completa la palabra?</p>
                    </div>
                    <div id="options" class="grid grid-cols-2 sm:grid-cols-4 gap-4 pt-4"></div>
                </section>

                <section id="resultScreen" class="hidden text-center space-y-6 animate-in fade-in zoom-in duration-300">
                    <div id="resultIcon" class="text-9xl">✅</div>
                    <h2 id="resultText" class="text-5xl font-black">¡Muy bien!</h2>
                    <div id="correctAnswer" class="text-2xl bg-slate-100 px-8 py-4 rounded-2xl font-bold text-slate-700"></div>
                </section>

                <section id="gameOverScreen" class="hidden text-center space-y-8 animate-in slide-in-from-bottom duration-500">
                    <div id="gameOverEmoji" class="text-9xl">🏆</div>
                    <h2 id="gameOverTitle" class="text-5xl font-black text-slate-800">¡Genial!</h2>
                    <div class="bg-gradient-to-br from-indigo-600 to-blue-700 text-white p-8 rounded-3xl shadow-2xl transform -rotate-2">
                        <p class="text-lg opacity-80 font-bold uppercase tracking-wider text-indigo-100">Puntaje Total</p>
                        <p id="finalScore" class="text-7xl font-black my-2">0</p>
                        <p id="finalLevels" class="font-medium text-indigo-100"></p>
                    </div>
                    <button onclick="resetGame()" class="group flex items-center gap-3 mx-auto bg-slate-900 text-white px-10 py-5 rounded-2xl text-xl font-bold hover:bg-slate-800 transition-all active:scale-95">
                        <span>🔄 Jugar de nuevo</span>
                    </button>
                </section>
            </div>
        </main>
    </div>

    <script>
        const levels = [
            { word: "CASA", display: "CA__", missing: "SA", options: ["SA", "SE", "SI", "SO"], emoji: "🏠", hint: "Lugar donde vivimos." },
            { word: "PATO", display: "PA__", missing: "TO", options: ["TO", "TA", "TE", "TI"], emoji: "🦆", hint: "Animal que dice cuac." },
            { word: "MESA", display: "ME__", missing: "SA", options: ["SA", "SE", "SI", "SO"], emoji: "🍽️", hint: "Mueble donde comemos." },
            { word: "TAZA", display: "TA__", missing: "ZA", options: ["ZA", "CA", "SA", "CHA"], emoji: "☕", hint: "Se usa para tomar café." },
            { word: "PELOTA", display: "__LOTA", missing: "PE", options: ["PE", "PA", "PI", "PO"], emoji: "⚽", hint: "Se usa para jugar al fútbol." }
        ];

        let currentLevel = 0, score = 0, streak = 0, hearts = 3;
        let voiceEnabled = false, highContrast = false, largeText = false;
        const synth = window.speechSynthesis;

        // Función para barajar un array (Algoritmo Fisher-Yates)
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function speak(text) {
            if (!voiceEnabled || !synth) return;
            synth.cancel(); 
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-ES';
            utter.rate = 0.9;
            synth.speak(utter);
        }

        function updateDisplay() {
            const level = levels[currentLevel];
            
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('currentLevel').textContent = currentLevel + 1;
            document.getElementById('totalLevels').textContent = levels.length;
            document.getElementById('progressFill').style.width = `${(currentLevel / levels.length) * 100}%`;

            const heartsBox = document.getElementById('hearts');
            heartsBox.innerHTML = '';
            for(let i=0; i<3; i++) {
                const h = document.createElement('span');
                h.textContent = i < hearts ? '❤️' : '🖤';
                h.className = `text-2xl ${i >= hearts ? 'grayscale opacity-30' : 'drop-shadow-sm'}`;
                heartsBox.appendChild(h);
            }

            document.getElementById('characterEmoji').textContent = level.emoji;
            document.getElementById('characterName').textContent = level.display;
            document.getElementById('characterHint').textContent = level.hint;

            // --- Lógica de Barajado ---
            const optionsBox = document.getElementById('options');
            optionsBox.innerHTML = '';
            
            // Barajamos las opciones antes de mostrarlas
            const shuffledOptions = shuffleArray(level.options);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 text-indigo-600 text-2xl font-black p-6 rounded-2xl shadow-sm transition-all active:scale-90 focus:ring-4 focus:ring-indigo-200";
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(opt);
                optionsBox.appendChild(btn);
            });

            if(voiceEnabled) speak(`Nivel ${currentLevel + 1}. Pista: ${level.hint}. La palabra es: ${level.display.replace('__', ' espacio ')}`);
        }

        function handleAnswer(choice) {
            const level = levels[currentLevel];
            const isCorrect = choice.toUpperCase() === level.missing.toUpperCase();
            
            document.querySelectorAll('#options button').forEach(b => b.disabled = true);
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            const resIcon = document.getElementById('resultIcon');
            const resText = document.getElementById('resultText');
            
            if(isCorrect) {
                resIcon.textContent = '✅';
                resText.textContent = '¡Correcto!';
                resText.className = "text-5xl font-black text-emerald-600";
                score += 100 + (streak * 10);
                streak++;
                speak("¡Excelente! La palabra es " + level.word);
            } else {
                resIcon.textContent = '❌';
                resText.textContent = '¡Casi!';
                resText.className = "text-5xl font-black text-red-600";
                hearts--;
                streak = 0;
                speak("No te preocupes. La palabra correcta era " + level.word);
            }

            document.getElementById('correctAnswer').textContent = `La palabra completa es: ${level.word}`;

            setTimeout(() => {
                if(hearts <= 0) {
                    showGameOver(false);
                } else if (currentLevel < levels.length - 1 && isCorrect) {
                    currentLevel++;
                    resetScreens();
                } else if (!isCorrect) {
                    resetScreens();
                } else {
                    showGameOver(true);
                }
            }, 2500);
        }

        function resetScreens() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            updateDisplay();
        }

        function showGameOver(victory) {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            document.getElementById('gameOverEmoji').textContent = victory ? '🏆' : '💪';
            document.getElementById('gameOverTitle').textContent = victory ? '¡Campeón!' : '¡Sigue intentando!';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevels').textContent = `Completaste ${currentLevel + (victory ? 1 : 0)} de ${levels.length} niveles`;
            
            speak(victory ? "¡Felicitaciones! Has ganado el juego." : "Buen intento. Vuelve a probar.");
        }

        function resetGame() {
            currentLevel = 0; score = 0; streak = 0; hearts = 3;
            resetScreens();
        }

        document.getElementById('voiceToggle').onclick = () => {
            voiceEnabled = !voiceEnabled;
            const status = document.getElementById('voiceStatus');
            status.textContent = voiceEnabled ? 'ON' : 'OFF';
            status.className = voiceEnabled ? 'bg-emerald-500 px-2 py-1 rounded text-xs uppercase' : 'bg-red-500 px-2 py-1 rounded text-xs uppercase';
            if(voiceEnabled) speak("Voz activada");
        };

        document.getElementById('highContrast').onclick = () => {
            highContrast = !highContrast;
            document.documentElement.classList.toggle('high-contrast');
            document.getElementById('contrastStatus').textContent = highContrast ? 'Alto' : 'Normal';
        };

        document.getElementById('largeText').onclick = () => {
            largeText = !largeText;
            document.documentElement.classList.toggle('large-text');
            document.getElementById('textSizeStatus').textContent = largeText ? 'Grande' : 'Normal';
        };

        document.getElementById('readAll').onclick = () => {
            const level = levels[currentLevel];
            speak(`Estás en el nivel ${currentLevel + 1}. Puntaje ${score}. Pista: ${level.hint}. Palabra: ${level.display}.`);
        };

        document.getElementById('skipLevel').onclick = () => {
            if(currentLevel < levels.length - 1) {
                currentLevel++;
                updateDisplay();
            }
        };

        updateDisplay();
    </script>
</body>
</html>
